default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: password
  host: localhost

development:
  <<: *default
  database: movie_lister_development

test:
  <<: *default
  database: movie_lister_test

production:
  primary: &primary_production
    <<: *default
    database: movie_lister_production
    username: movie_lister
    password: <%= ENV["MOVIE_LISTER_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: movie_lister_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: movie_lister_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: movie_lister_production_cable
    migrations_paths: db/cable_migrate
